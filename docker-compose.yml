services:
  web:
    build: .
    container_name: javascript-apache
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: javascript-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 96778932
      MYSQL_DATABASE: mydb
      MYSQL_USER: mona
      MYSQL_PASSWORD: p@ssword
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: javascript-phpmyadmin
    restart: always
    ports:
      - "81:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - db

volumes:
  db_data:
